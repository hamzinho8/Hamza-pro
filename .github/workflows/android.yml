name: Build Android APK
on:
  push:
    branches: [main, master] # Marche peu importe le nom de ta branche

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        # Cette commande force Gradle à ignorer les erreurs de structure mineures
        run: gradle assembleDebug --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HamzaPro-Release
          path: "**/build/outputs/apk/debug/*.apk"
